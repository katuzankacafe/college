<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Адмінка — Безпечна версія</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--green:#1a7a3c;--green-light:#e8f5ee;--orange:#f5a623;--red:#d93025;--red-light:#fce8e6;--text:#1e2a1e;--muted:#6b7c6b;--bg:#f0f4f0;--radius:14px;--shadow:0 2px 12px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Nunito",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;border:none;border-radius:10px;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;transition:opacity .2s,transform .15s}
.btn:active{transform:scale(.97)}
.btn-green{background:var(--green);color:#fff}.btn-orange{background:var(--orange);color:#fff}
.btn-outline{background:transparent;border:1.5px solid var(--green);color:var(--green)}
.btn-sm{padding:7px 13px;font-size:13px;border-radius:8px}.btn-full{width:100%}.btn:hover{opacity:.88}
.input{width:100%;padding:12px 14px;border:1.5px solid #dde8dd;border-radius:10px;font-family:inherit;font-size:15px;outline:none;color:var(--text);background:#fff}
.input:focus{border-color:var(--green)}
.header{background:#fff;padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;border-bottom:3px solid var(--orange);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.logo{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;background:var(--green-light);font-size:22px;border:2px solid var(--orange)}
.header-text{flex:1}.header-text h1{font-size:15px;font-weight:800;color:var(--green)}.header-text p{font-size:11px;color:var(--muted)}
.container{max-width:560px;margin:0 auto;padding:16px}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border-radius:var(--radius);padding:32px 28px;width:100%;max-width:360px;box-shadow:var(--shadow);text-align:center}
.login-card .logo{margin:0 auto 14px}
.login-card h2{font-size:20px;font-weight:800;color:var(--green);margin-bottom:4px}
.login-card p{font-size:13px;color:var(--muted);margin-bottom:18px}
.err{color:var(--red);font-size:13px;margin-top:8px;min-height:18px}
.save-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 22px;border-radius:24px;font-size:13px;font-weight:700;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
.save-toast.show{opacity:1}
.toggle{position:relative;width:44px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.tslider{position:absolute;inset:0;background:#ccc;border-radius:12px;cursor:pointer;transition:.3s}
.tslider:before{content:"";position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s}
.toggle input:checked+.tslider{background:var(--green)}
.toggle input:checked+.tslider:before{transform:translateX(20px)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal-overlay.hidden{display:none}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:560px;padding:24px 20px 32px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:18px;font-weight:800;margin-bottom:20px}
.modal-btns{display:flex;gap:10px;margin-top:18px}
.modal-btns .btn{flex:1}
.photo-area{width:100%;height:130px;border-radius:10px;border:1.5px dashed #ccc;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--muted);cursor:pointer;overflow:hidden;background:#fafafa}
.photo-area img{width:100%;height:100%;object-fit:cover}
.tabs{display:flex;background:#fff;border-bottom:2px solid #e8eee8;overflow-x:auto}
.tab{flex:1;min-width:80px;padding:12px 8px;font-family:inherit;font-size:13px;font-weight:700;border:none;background:none;cursor:pointer;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap}
.tab.active{color:var(--green);border-bottom-color:var(--green)}
.tc{display:none;padding:16px}.tc.active{display:block}
.cat-block{background:#fff;border-radius:var(--radius);margin-bottom:14px;overflow:hidden;box-shadow:var(--shadow)}
.cat-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid #f0f4f0}
.cat-hdr-title{flex:1;font-size:15px;font-weight:800}
.dish-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #f7f9f7}
.dish-row:last-child{border-bottom:none}
.dish-thumb{width:44px;height:44px;border-radius:8px;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden}
.dish-thumb img{width:100%;height:100%;object-fit:cover}
.dish-ri{flex:1;min-width:0}.dish-rn{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.dish-rp{font-size:12px;color:var(--green);font-weight:700;margin-top:2px}
.add-cat-row{padding:12px 14px;display:flex;gap:8px}
.user-row{display:flex;align-items:center;gap:12px;padding:14px;border-bottom:1px solid #f0f4f0}
.user-row:last-child{border-bottom:none}
.user-avatar{width:40px;height:40px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.history-item{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
.history-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-green{background:var(--green-light);color:var(--green)}
.small-note{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.45}
</style>
</head>
<body>
<div class="login-wrap" id="login-screen">
  <div class="login-card">
    <div class="logo">☕</div>
    <h2>Адміністратор</h2>
    <p>Вхід через Firebase Authentication</p>
    <input class="input" type="email" id="email" placeholder="admin@example.com" style="margin-bottom:10px">
    <input class="input" type="password" id="pwd" placeholder="Пароль" style="margin-bottom:12px">
    <button class="btn btn-green btn-full" onclick="doLogin()">Увійти</button>
    <p class="err" id="lerr"></p>
    <p class="small-note">Доступ лише для UID, доданих у <b>cafe/admins</b>.</p>
  </div>
</div>

<div style="display:none" id="app-screen">
  <div class="header">
    <div class="logo">☕</div>
    <div class="header-text"><h1>Адмінка кафе</h1><p>Безпечний режим</p></div>
    <button class="btn btn-sm btn-outline" onclick="doLogout()" style="margin-left:auto">Вийти</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('obidy',this)">🥗 Обіди</button>
    <button class="tab" onclick="switchTab('kafeteriy',this)">☕ Кафетерій</button>
    <button class="tab" onclick="switchTab('history',this)">📋 Історія</button>
  </div>
  <div class="tc active" id="tc-obidy"></div>
  <div class="tc" id="tc-kafeteriy"></div>
  <div class="tc" id="tc-history"></div>
</div>

<div class="save-toast" id="toast">Збережено ✓</div>

<div class="modal-overlay hidden" id="dish-modal">
  <div class="modal">
    <h3 id="modal-title">Додати страву</h3>
    <div class="field"><label>Назва страви</label><input class="input" id="f-name" placeholder="Наприклад: Борщ"></div>
    <div class="field" style="margin-top:10px"><label>Опис (необов'язково)</label><input class="input" id="f-desc" placeholder="Інгредієнти, вага..."></div>
    <div class="field" style="margin-top:10px"><label>Ціна (грн)</label><input class="input" id="f-price" type="number" min="0" step="0.01" placeholder="0"></div>
    <div class="field" style="margin-top:10px">
      <label>Фото страви</label>
      <div class="photo-area" id="photo-area" onclick="document.getElementById('f-photo').click()">
        <span id="photo-ph">Натисніть, щоб додати фото</span>
        <img id="photo-thumb" style="display:none" alt="thumb">
      </div>
      <input type="file" id="f-photo" accept="image/*" style="display:none" onchange="handlePhoto(this)">
    </div>
    <div class="small-note">Фото стискайте заздалегідь (рекомендовано до 300 КБ).</div>
    <div class="modal-btns">
      <button class="btn btn-outline" onclick="closeModal()">Скасувати</button>
      <button class="btn btn-green" onclick="saveDish()">Зберегти</button>
    </div>
  </div>
</div>

<script type="module">
const firebaseConfig = {
  apiKey: "AIzaSyB584GOt9Pf6GA5M2N-Txi0Yk2JmKTRJ-k",
  authDomain: "cafe-kpk.firebaseapp.com",
  databaseURL: "https://cafe-kpk-default-rtdb.firebaseio.com",
  projectId: "cafe-kpk",
  storageBucket: "cafe-kpk.firebasestorage.app",
  messagingSenderId: "1052158611750",
  appId: "1:1052158611750:web:97522c938d94932f51b1e7",
  measurementId: "G-592QG3E6JP"
};

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const DEFAULT_MENU = {
  obidy:{categories:{salaty:{id:"salaty",name:"Салати",icon:"🥗"},pershi:{id:"pershi",name:"Перші страви",icon:"🍲"},osnovni:{id:"osnovni",name:"Основні страви",icon:"🍽️"}},dishes:{}},
  kafeteriy:{categories:{napoi:{id:"napoi",name:"Напої",icon:"☕"},vypichka:{id:"vypichka",name:"Випічка",icon:"🥐"},zakusky:{id:"zakusky",name:"Закуски",icon:"🥪"}},dishes:{}}
};

const DEFAULT_USERS = {
  waiter1:{role:"waiter",name:"Офіціант 1",email:"waiter1@example.com"},
  waiter2:{role:"waiter",name:"Офіціант 2",email:"waiter2@example.com"},
  waiter3:{role:"waiter",name:"Офіціант 3",email:"waiter3@example.com"}
};

let menuData = {};
let ordersData = {};
let isAdmin = false;
let historyFilterDate = "";
const historySelectedIds = new Set();

function esc(v){
  return String(v ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#39;");
}

function showToast(){const t=document.getElementById("toast");t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1800);}

async function initDB(){
  const menuSnap = await get(ref(db,"cafe/menu"));
  if(!menuSnap.exists()) await set(ref(db,"cafe/menu"), DEFAULT_MENU);

  const usersSnap = await get(ref(db,"cafe/users"));
  if(!usersSnap.exists()) await set(ref(db,"cafe/users"), DEFAULT_USERS);
}

async function checkIsAdmin(uid){
  // 1) Legacy mode: cafe/admins/{uid}: true
  try{
    const adminsSnap = await get(ref(db,`cafe/admins/${uid}`));
    const v = adminsSnap.val();
    if(
      v === true ||
      v === "true" ||
      v === 1 ||
      v === "1" ||
      (typeof v === "object" && String(v?.role || "").toLowerCase() === "admin")
    ){
      return true;
    }
  }catch(_e){}

  // 2) Clean mode: cafe/staff/{uid}/role: "admin"
  try{
    const roleSnap = await get(ref(db,`cafe/staff/${uid}/role`));
    const role = String(roleSnap.val() || "").toLowerCase();
    if(role === "admin") return true;
  }catch(_e){}

  return false;
}

function attachListeners(){
  onValue(ref(db,"cafe/menu"),snap=>{menuData=snap.val()||{};renderAll();});
  onValue(ref(db,"cafe/orders"),snap=>{
    ordersData=snap.val()||{};
    const activeTab = document.querySelector(".tab.active");
    if(activeTab && activeTab.textContent.includes("Історія")) renderHistory();
  });
}

function startAdminApp(){
  document.getElementById("login-screen").style.display="none";
  document.getElementById("app-screen").style.display="block";
  renderAll();
}

function stopAdminApp(){
  document.getElementById("login-screen").style.display="flex";
  document.getElementById("app-screen").style.display="none";
}

onAuthStateChanged(auth, async (user)=>{
  if(!user){
    isAdmin = false;
    stopAdminApp();
    return;
  }

  try{
    const ok = await checkIsAdmin(user.uid);
    if(!ok){
      await signOut(auth);
      document.getElementById("lerr").textContent = "Немає прав адміністратора (UID не доданий у cafe/admins).";
      return;
    }

    isAdmin = true;
    await initDB();
    attachListeners();
    startAdminApp();
  }catch(err){
    console.error(err);
    const code = err?.code ? ` (${err.code})` : "";
    document.getElementById("lerr").textContent = "Помилка доступу до бази" + code;
  }
});

document.getElementById("pwd").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});
document.getElementById("email").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});

window.doLogin = async function(){
  const email = document.getElementById("email").value.trim();
  const pwd = document.getElementById("pwd").value;
  const errEl = document.getElementById("lerr");
  errEl.textContent = "";

  if(!email || !pwd){
    errEl.textContent = "Введіть email і пароль";
    return;
  }

  try{
    await signInWithEmailAndPassword(auth, email, pwd);
  }catch(err){
    console.error(err);
    const code = err?.code || "";
    if(code){
      errEl.textContent = `Помилка входу: ${code}`;
    }else{
      errEl.textContent = "Помилка входу. Перевірте email/пароль.";
    }

    // In-app/file:// contexts can be unstable for Firebase Auth.
    if(location.protocol === "file:"){
      alert("Відкрийте цю сторінку через локальний сервер (http://localhost), а не file://. Це часто вирішує проблему входу Firebase Auth.");
    }
  }
};

window.doLogout = async function(){
  await signOut(auth);
  document.getElementById("pwd").value="";
};

function renderAll(){renderTab("obidy");renderTab("kafeteriy");}

function renderTab(sid){
  const sec=menuData[sid];
  const el=document.getElementById("tc-"+sid);
  if(!sec||!el)return;
  const cats=Object.values(sec.categories||{});
  const dishes=Object.values(sec.dishes||{});
  let html='<div style="padding-top:4px">';

  cats.forEach(cat=>{
    const catDishes=dishes.filter(d=>d.category===cat.id);
    html+=`<div class="cat-block">
      <div class="cat-hdr">
        <span style="font-size:20px">${esc(cat.icon)}</span>
        <span class="cat-hdr-title">${esc(cat.name)}</span>
        <button class="btn btn-orange btn-sm" onclick="openAddDish('${sid}','${cat.id}')">+ Страва</button>
        <button class="btn btn-sm" style="background:var(--red-light);color:var(--red);border:none" onclick="deleteCat('${sid}','${cat.id}')">✕</button>
      </div>`;

    catDishes.forEach(d=>{
      const thumb=d.photo?`<div class="dish-thumb"><img src="${d.photo}" alt="dish"></div>`:`<div class="dish-thumb">${esc(cat.icon)}</div>`;
      html+=`<div class="dish-row">
        ${thumb}
        <div class="dish-ri"><div class="dish-rn">${esc(d.name)}</div><div class="dish-rp">${esc(d.price)} грн</div></div>
        <label class="toggle"><input type="checkbox" ${d.active?"checked":""} onchange="toggleDish('${sid}','${d.id}',this.checked)"><span class="tslider"></span></label>
        <button class="btn btn-sm btn-outline" onclick="openEditDish('${sid}','${d.id}')">✎</button>
        <button class="btn btn-sm" style="background:var(--red-light);color:var(--red);border:none" onclick="deleteDish('${sid}','${d.id}')">✕</button>
      </div>`;
    });

    if(!catDishes.length)html+='<div style="padding:12px 14px;color:#bbb;font-size:13px;text-align:center">Немає страв</div>';
    html+='</div>';
  });

  html+=`<div class="cat-block"><div class="add-cat-row">
    <input class="input" id="nc-name-${sid}" placeholder="Нова категорія" style="flex:1">
    <input class="input" id="nc-icon-${sid}" placeholder="🍴" style="width:58px;text-align:center">
    <button class="btn btn-green btn-sm" onclick="addCat('${sid}')">Додати</button>
  </div></div>`;

  html+='</div>';
  el.innerHTML=html;
}

function renderHistory(){
  const el=document.getElementById("tc-history");if(!el)return;
  const orders=Object.values(ordersData||{})
    .filter(o=>o.status==="closed")
    .sort((a,b)=>new Date(b.closedAt||b.createdAt||0)-new Date(a.closedAt||a.createdAt||0));

  const byDate = historyFilterDate
    ? orders.filter(o=>toLocalDateStr(o.closedAt||o.createdAt)===historyFilterDate)
    : orders;

  let html=`<div class="cat-block" style="padding:12px 14px;display:flex;flex-wrap:wrap;gap:8px;align-items:center">
    <input class="input" type="date" id="history-date" value="${esc(historyFilterDate)}" style="max-width:190px">
    <button class="btn btn-sm btn-outline" onclick="applyHistoryDate()">Фільтрувати</button>
    <button class="btn btn-sm btn-outline" onclick="clearHistoryDate()">Скинути</button>
    <button class="btn btn-sm btn-outline" onclick="exportHistoryCsv()">Експорт CSV</button>
    <button class="btn btn-sm" style="background:var(--red-light);color:var(--red);border:none" onclick="deleteSelectedHistory()">Видалити вибрані</button>
    <button class="btn btn-sm" style="background:var(--red-light);color:var(--red);border:none" onclick="deleteFilteredHistory()">Видалити за фільтром</button>
  </div>`;

  if(!byDate.length){
    html+='<div style="text-align:center;padding:40px;color:#bbb">Записів за вибраний період немає</div>';
    el.innerHTML=html;
    return;
  }

  byDate.forEach(o=>{
    const oid = String(o.id||"");
    const dt=new Date(o.createdAt||Date.now());
    const time=dt.toLocaleString("uk-UA",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
    const total=(o.items||[]).reduce((s,i)=>s+Number(i.price||0)*Number(i.qty||0),0);
    html+=`<div class="history-item">
      <div class="history-hdr">
        <label style="display:flex;align-items:center;gap:8px">
          <input type="checkbox" ${historySelectedIds.has(oid)?"checked":""} onchange="toggleHistorySelect('${esc(oid)}',this.checked)">
          <span style="font-weight:800">Стіл №${esc(o.table||"?")}</span>
        </label>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="badge badge-green">Виконано</span>
          <button class="btn btn-sm" style="background:var(--red-light);color:var(--red);border:none" onclick="deleteOneHistory('${esc(oid)}')">✕</button>
        </div>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px">${esc(time)} · ${esc(o.waiterName||"Офіціант")}</div>`;
    (o.items||[]).forEach(i=>{html+=`<div style="font-size:13px;display:flex;justify-content:space-between;padding:3px 0"><span>${esc(i.name)} × ${esc(i.qty)}</span><span style="font-weight:700">${(Number(i.price||0)*Number(i.qty||0)).toFixed(2)} грн</span></div>`;});
    html+=`<div style="border-top:1px solid #eee;margin-top:8px;padding-top:8px;font-weight:800;display:flex;justify-content:space-between"><span>Разом</span><span>${total.toFixed(2)} грн</span></div></div>`;
  });
  el.innerHTML=html;
}

window.switchTab=function(sid,btn){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tc").forEach(t=>t.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("tc-"+sid).classList.add("active");
  if(sid==="history")renderHistory();
};

window.addCat=async function(sid){
  if(!isAdmin)return;
  const name=document.getElementById("nc-name-"+sid).value.trim();
  const icon=document.getElementById("nc-icon-"+sid).value.trim()||"🍴";
  if(!name)return;
  const id="cat_"+Date.now();
  await set(ref(db,`cafe/menu/${sid}/categories/${id}`),{id,name,icon});
  document.getElementById("nc-name-"+sid).value="";
  document.getElementById("nc-icon-"+sid).value="";
  showToast();
};

window.deleteCat=async function(sid,catId){
  if(!isAdmin)return;
  if(!confirm("Видалити категорію і всі страви?"))return;
  await remove(ref(db,`cafe/menu/${sid}/categories/${catId}`));
  const dishes=Object.values(menuData[sid]?.dishes||{}).filter(d=>d.category===catId);
  for(const d of dishes) await remove(ref(db,`cafe/menu/${sid}/dishes/${d.id}`));
  showToast();
};

window.toggleDish=async function(sid,dishId,val){
  if(!isAdmin)return;
  await set(ref(db,`cafe/menu/${sid}/dishes/${dishId}/active`),val);
  showToast();
};

window.deleteDish=async function(sid,dishId){
  if(!isAdmin)return;
  if(!confirm("Видалити страву?"))return;
  await remove(ref(db,`cafe/menu/${sid}/dishes/${dishId}`));
  showToast();
};

function toLocalDateStr(isoLike){
  const d = new Date(isoLike||Date.now());
  if(Number.isNaN(d.getTime())) return "";
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,"0");
  const day=String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}

window.applyHistoryDate = function(){
  const inp=document.getElementById("history-date");
  historyFilterDate = inp?.value || "";
  renderHistory();
};

window.clearHistoryDate = function(){
  historyFilterDate = "";
  renderHistory();
};

window.toggleHistorySelect = function(orderId, checked){
  if(checked) historySelectedIds.add(orderId);
  else historySelectedIds.delete(orderId);
};

window.deleteOneHistory = async function(orderId){
  if(!confirm("Видалити цей запис з історії?")) return;
  await remove(ref(db,`cafe/orders/${orderId}`));
  historySelectedIds.delete(orderId);
  showToast();
};

window.deleteSelectedHistory = async function(){
  const ids=[...historySelectedIds];
  if(!ids.length){alert("Немає вибраних записів.");return;}
  if(!confirm(`Видалити ${ids.length} вибраних записів?`)) return;
  for(const id of ids) await remove(ref(db,`cafe/orders/${id}`));
  historySelectedIds.clear();
  showToast();
};

window.deleteFilteredHistory = async function(){
  const orders=Object.values(ordersData||{}).filter(o=>o.status==="closed");
  const ids=(historyFilterDate
    ? orders.filter(o=>toLocalDateStr(o.closedAt||o.createdAt)===historyFilterDate)
    : orders
  ).map(o=>String(o.id||"")).filter(Boolean);

  if(!ids.length){alert("Немає записів для видалення.");return;}
  if(!confirm(`Видалити ${ids.length} записів${historyFilterDate?` за ${historyFilterDate}`:""}?`)) return;
  for(const id of ids) await remove(ref(db,`cafe/orders/${id}`));
  ids.forEach(id=>historySelectedIds.delete(id));
  showToast();
};

window.exportHistoryCsv = function(){
  const closedOrders = Object.values(ordersData||{})
    .filter(o=>o && o.status==="closed")
    .sort((a,b)=>new Date(b.closedAt||b.createdAt||0)-new Date(a.closedAt||a.createdAt||0));

  const list = historyFilterDate
    ? closedOrders.filter(o=>toLocalDateStr(o.closedAt||o.createdAt)===historyFilterDate)
    : closedOrders;

  if(!list.length){
    alert("Немає записів для експорту.");
    return;
  }

  const sep = ";";
  const header = [
    "order_id","status","table","waiter_name","waiter_login",
    "created_at","closed_at","item_name","item_qty","item_price","item_total","order_total"
  ];

  const rows = [header];

  for(const o of list){
    const items = Array.isArray(o.items) ? o.items : [];
    const orderTotal = items.reduce((s,i)=>s+Number(i?.price||0)*Number(i?.qty||0),0).toFixed(2);

    if(!items.length){
      rows.push([
        String(o.id||""),
        String(o.status||""),
        String(o.table??""),
        String(o.waiterName||""),
        String(o.waiterLogin||""),
        String(o.createdAt||""),
        String(o.closedAt||""),
        "", "", "", "",
        orderTotal
      ]);
      continue;
    }

    for(const i of items){
      const itemTotal = (Number(i?.price||0)*Number(i?.qty||0)).toFixed(2);
      rows.push([
        String(o.id||""),
        String(o.status||""),
        String(o.table??""),
        String(o.waiterName||""),
        String(o.waiterLogin||""),
        String(o.createdAt||""),
        String(o.closedAt||""),
        String(i?.name||""),
        String(i?.qty??""),
        Number(i?.price||0).toFixed(2),
        itemTotal,
        orderTotal
      ]);
    }
  }

  const q = (v)=>`"${String(v).replaceAll('"','""')}"`;
  const csv = rows.map(r=>r.map(q).join(sep)).join("\r\n");
  const bom = "\uFEFF"; // for correct UTF-8 in Excel
  const blob = new Blob([bom + csv], {type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const postfix = historyFilterDate ? `_${historyFilterDate}` : "_all";
  a.href = url;
  a.download = `history_orders${postfix}.csv`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
};

let _sid="",_catId="",_dishId="",_photo="",_editActive=true;
window.openAddDish=function(sid,catId){
  _sid=sid;_catId=catId;_dishId="";_photo="";_editActive=true;
  document.getElementById("modal-title").textContent="Додати страву";
  document.getElementById("f-name").value="";
  document.getElementById("f-desc").value="";
  document.getElementById("f-price").value="";
  document.getElementById("photo-thumb").style.display="none";
  document.getElementById("photo-ph").style.display="";
  document.getElementById("dish-modal").classList.remove("hidden");
};

window.openEditDish=function(sid,dishId){
  const d=menuData[sid]?.dishes?.[dishId];
  if(!d)return;
  _sid=sid;_catId=d.category;_dishId=dishId;_photo=d.photo||"";_editActive=Boolean(d.active);
  document.getElementById("modal-title").textContent="Редагувати страву";
  document.getElementById("f-name").value=d.name||"";
  document.getElementById("f-desc").value=d.desc||"";
  document.getElementById("f-price").value=d.price||"";
  if(d.photo){
    document.getElementById("photo-thumb").src=d.photo;
    document.getElementById("photo-thumb").style.display="block";
    document.getElementById("photo-ph").style.display="none";
  }else{
    document.getElementById("photo-thumb").style.display="none";
    document.getElementById("photo-ph").style.display="";
  }
  document.getElementById("dish-modal").classList.remove("hidden");
};

window.closeModal=function(){document.getElementById("dish-modal").classList.add("hidden");};

window.handlePhoto=function(input){
  const file=input.files[0];
  if(!file)return;
  if(file.size>300*1024){alert("Файл завеликий. Будь ласка, зменште до ~300КБ.");input.value="";return;}
  const r=new FileReader();
  r.onload=e=>{
    _photo=e.target.result;
    document.getElementById("photo-thumb").src=_photo;
    document.getElementById("photo-thumb").style.display="block";
    document.getElementById("photo-ph").style.display="none";
  };
  r.readAsDataURL(file);
};

window.saveDish=async function(){
  if(!isAdmin)return;
  const name=document.getElementById("f-name").value.trim();
  const rawPrice=document.getElementById("f-price").value.trim();
  const desc=document.getElementById("f-desc").value.trim();
  const priceNum=Number(rawPrice);

  if(!name){alert("Вкажіть назву");return;}
  if(!Number.isFinite(priceNum)||priceNum<0){alert("Некоректна ціна");return;}

  const id=_dishId||("dish_"+Date.now());
  await set(ref(db,`cafe/menu/${_sid}/dishes/${id}`),{
    id,
    category:_catId,
    name,
    desc,
    price:priceNum.toFixed(2),
    photo:_photo,
    active:_dishId ? _editActive : true
  });
  closeModal();
  showToast();
};
