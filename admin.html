<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Адмінка — Безпечна версія</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--green:#1a7a3c;--green-light:#e8f5ee;--orange:#f5a623;--red:#d93025;--red-light:#fce8e6;--text:#1e2a1e;--muted:#6b7c6b;--bg:#f0f4f0;--radius:14px;--shadow:0 2px 12px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Nunito",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;border:none;border-radius:10px;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;transition:opacity .2s,transform .15s}
.btn:active{transform:scale(.97)}
.btn-green{background:var(--green);color:#fff}.btn-orange{background:var(--orange);color:#fff}
.btn-outline{background:transparent;border:1.5px solid var(--green);color:var(--green)}
.btn-sm{padding:7px 13px;font-size:13px;border-radius:8px}.btn-full{width:100%}.btn:hover{opacity:.88}
.input{width:100%;padding:12px 14px;border:1.5px solid #dde8dd;border-radius:10px;font-family:inherit;font-size:15px;outline:none;color:var(--text);background:#fff}
.input:focus{border-color:var(--green)}
.header{background:#fff;padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;border-bottom:3px solid var(--orange);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.logo{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;background:var(--green-light);font-size:22px;border:2px solid var(--orange)}
.header-text{flex:1}.header-text h1{font-size:15px;font-weight:800;color:var(--green)}.header-text p{font-size:11px;color:var(--muted)}
.container{max-width:560px;margin:0 auto;padding:16px}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border-radius:var(--radius);padding:32px 28px;width:100%;max-width:360px;box-shadow:var(--shadow);text-align:center}
.login-card .logo{margin:0 auto 14px}
.login-card h2{font-size:20px;font-weight:800;color:var(--green);margin-bottom:4px}
.login-card p{font-size:13px;color:var(--muted);margin-bottom:18px}
.err{color:var(--red);font-size:13px;margin-top:8px;min-height:18px}
.save-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 22px;border-radius:24px;font-size:13px;font-weight:700;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
.save-toast.show{opacity:1}
.toggle{position:relative;width:44px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.tslider{position:absolute;inset:0;background:#ccc;border-radius:12px;cursor:pointer;transition:.3s}
.tslider:before{content:"";position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s}
.toggle input:checked+.tslider{background:var(--green)}
.toggle input:checked+.tslider:before{transform:translateX(20px)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal-overlay.hidden{display:none}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:560px;padding:24px 20px 32px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:18px;font-weight:800;margin-bottom:20px}
.modal-btns{display:flex;gap:10px;margin-top:18px}
.modal-btns .btn{flex:1}
.photo-area{width:100%;height:130px;border-radius:10px;border:1.5px dashed #ccc;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--muted);cursor:pointer;overflow:hidden;background:#fafafa}
.photo-area img{width:100%;height:100%;object-fit:cover}
.tabs{display:flex;background:#fff;border-bottom:2px solid #e8eee8;overflow-x:auto}
.tab{flex:1;min-width:80px;padding:12px 8px;font-family:inherit;font-size:13px;font-weight:700;border:none;background:none;cursor:pointer;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap}
.tab.active{color:var(--green);border-bottom-color:var(--green)}
.tc{display:none;padding:16px}.tc.active{display:block}
.cat-block{background:#fff;border-radius:var(--radius);margin-bottom:14px;overflow:hidden;box-shadow:var(--shadow)}
.cat-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid #f0f4f0}
.cat-hdr-title{flex:1;font-size:15px;font-weight:800}
.dish-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #f7f9f7}
.dish-row:last-child{border-bottom:none}
.dish-thumb{width:44px;height:44px;border-radius:8px;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden}
.dish-thumb img{width:100%;height:100%;object-fit:cover}
.dish-ri{flex:1;min-width:0}.dish-rn{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.dish-rp{font-size:12px;color:var(--green);font-weight:700;margin-top:2px}
.add-cat-row{padding:12px 14px;display:flex;gap:8px}
.user-row{display:flex;align-items:center;gap:12px;padding:14px;border-bottom:1px solid #f0f4f0}
.user-row:last-child{border-bottom:none}
.user-avatar{width:40px;height:40px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.history-item{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
.history-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-green{background:var(--green-light);color:var(--green)}
.small-note{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.45}
</style>
</head>
<body>
<div class="login-wrap" id="login-screen">
  <div class="login-card">
    <div class="logo">☕</div>
    <h2>Адміністратор</h2>
    <p>Вхід через Firebase Authentication</p>
    <input class="input" type="email" id="email" placeholder="admin@example.com" style="margin-bottom:10px">
    <input class="input" type="password" id="pwd" placeholder="Пароль" style="margin-bottom:12px">
    <button class="btn btn-green btn-full" onclick="doLogin()">Увійти</button>
    <p class="err" id="lerr"></p>
    <p class="small-note">Доступ лише для UID, доданих у <b>cafe/admins</b>.</p>
  </div>
</div>

<div style="display:none" id="app-screen">
  <div class="header">
    <div class="logo">☕</div>
    <div class="header-text"><h1>Адмінка кафе</h1><p>Безпечний режим</p></div>
    <button class="btn btn-sm btn-outline" onclick="doLogout()" style="margin-left:auto">Вийти</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('obidy',this)">🥗 Обіди</button>
    <button class="tab" onclick="switchTab('kafeteriy',this)">☕ Кафетерій</button>
    <button class="tab" onclick="switchTab('users',this)">👤 Офіціанти</button>
    <button class="tab" onclick="switchTab('history',this)">📋 Історія</button>
  </div>
  <div class="tc active" id="tc-obidy"></div>
  <div class="tc" id="tc-kafeteriy"></div>
  <div class="tc" id="tc-users"></div>
  <div class="tc" id="tc-history"></div>
</div>
