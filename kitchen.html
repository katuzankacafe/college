<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Кухня — Навчальне кафе</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Nunito",sans-serif;background:#1a2a1a;min-height:100vh}
.k-login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.k-login-card{background:#1e3a1e;border-radius:16px;padding:32px 28px;width:100%;max-width:360px;text-align:center;border:1px solid #2a5a2a}
.k-login-card img{width:72px;height:72px;border-radius:50%;object-fit:cover;border:2px solid #f5a623;margin-bottom:16px}
.k-login-card h2{font-size:20px;font-weight:800;color:#f5a623;margin-bottom:4px}
.k-login-card p{font-size:13px;color:#8aab8a;margin-bottom:24px}
.k-input{width:100%;padding:12px 14px;border:1.5px solid #2a5a2a;border-radius:10px;font-family:inherit;font-size:15px;outline:none;color:#fff;background:#152a15;margin-bottom:12px}
.k-input:focus{border-color:#f5a623}
.k-btn{width:100%;padding:13px;border:none;border-radius:10px;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;background:#f5a623;color:#fff}
.k-btn:hover{opacity:.88}
.k-err{color:#ff6b6b;font-size:13px;margin-top:8px}
.k-header{background:#1e3a1e;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid #f5a623}
.k-header img{width:48px;height:48px;border-radius:50%;border:2px solid #f5a623;object-fit:cover}
.k-title{color:#fff;font-size:18px;font-weight:800}
.k-sub{color:#8aab8a;font-size:12px;margin-top:2px}
.clock{color:#f5a623;font-size:16px;font-weight:800}
.orders-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;padding:20px}
.order-card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.order-card-hdr{padding:14px 16px;background:#1a7a3c;color:#fff;display:flex;align-items:center;justify-content:space-between}
.order-table{font-size:20px;font-weight:800}
.order-waiter{font-size:12px;opacity:.85;margin-top:2px}
.order-time{font-size:13px;font-weight:700;opacity:.9;text-align:right}
.order-items{padding:14px 16px}
.order-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0f4f0;font-size:15px}
.order-item:last-child{border-bottom:none}
.order-item-name{font-weight:700}
.order-item-qty{background:#1a7a3c;color:#fff;border-radius:20px;padding:2px 10px;font-size:13px;font-weight:800}
.order-footer{padding:12px 16px;background:#f7f9f7;display:flex;justify-content:flex-end}
.close-btn{background:#1a7a3c;color:#fff;border:none;border-radius:10px;padding:10px 20px;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer}
.close-btn:hover{opacity:.88}
.empty-kitchen{text-align:center;padding:80px 20px;color:#4a6a4a}
.empty-icon{font-size:64px;margin-bottom:16px}
.empty-txt{font-size:18px;font-weight:700;color:#6a8a6a}
.new-badge{position:fixed;top:80px;right:20px;background:#f5a623;color:#fff;padding:10px 18px;border-radius:24px;font-weight:800;font-size:14px;z-index:100;animation:pulse 1s infinite}
.new-badge.hidden{display:none}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
</style>
</head>
<body>
<div class="k-login" id="k-login-screen">
  <div class="k-login-card">
    <img id="k-login-logo" alt="">
    <h2>Кухня</h2>
    <p>Навчальне кафе коледжу</p>
    <input class="k-input" type="text" id="k-login-field" placeholder="Логін" autocomplete="username" style="margin-bottom:10px">
    <input class="k-input" type="password" id="k-pwd" placeholder="Пароль" autocomplete="current-password">
    <button class="k-btn" onclick="doKitchenLogin()">Увійти</button>
    <p class="k-err" id="k-err"></p>
  </div>
</div>
<div style="display:none" id="k-app">
<div class="k-header">
  <div style="display:flex;align-items:center;gap:12px">
    <img id="k-logo" alt="">
    <div><div class="k-title">Кухня</div><div class="k-sub">Активні замовлення</div></div>
  </div>
  <div style="text-align:right">
    <div class="clock" id="clock"></div>
    <div style="color:#8aab8a;font-size:11px;margin-top:2px" id="order-count"></div>
  </div>
</div>
<div class="new-badge hidden" id="new-badge">🔔 Нове замовлення!</div>
<div id="orders-container"></div>
</div>
<script>
// Bridge for inline onclick handlers on all browsers/hosting modes
function doKitchenLogin(){ return window.__doKitchenLogin && window.__doKitchenLogin(); }
function doKitchenLogout(){ return window.__doKitchenLogout && window.__doKitchenLogout(); }
function closeOrder(id){ return window.__closeOrder && window.__closeOrder(id); }
</script>
