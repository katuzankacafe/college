<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Офіціант — Навчальне кафе</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--green:#1a7a3c;--green-light:#e8f5ee;--orange:#f5a623;--orange-light:#fff8ed;--red:#d93025;--red-light:#fce8e6;--blue:#1a6fa8;--blue-light:#e8f2fa;--text:#1e2a1e;--muted:#6b7c6b;--bg:#f0f4f0;--white:#fff;--radius:14px;--shadow:0 2px 12px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Nunito",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;border:none;border-radius:10px;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;transition:opacity .2s,transform .15s}
.btn:active{transform:scale(.97)}
.btn-green{background:var(--green);color:#fff}.btn-orange{background:var(--orange);color:#fff}
.btn-red{background:var(--red);color:#fff}.btn-outline{background:transparent;border:1.5px solid var(--green);color:var(--green)}
.btn-sm{padding:7px 13px;font-size:13px;border-radius:8px}.btn-full{width:100%}.btn:hover{opacity:.88}
.input{width:100%;padding:12px 14px;border:1.5px solid #dde8dd;border-radius:10px;font-family:inherit;font-size:15px;outline:none;color:var(--text);background:#fff}
.input:focus{border-color:var(--green)}
.header{background:#fff;padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;border-bottom:3px solid var(--orange);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.header img{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid var(--orange)}
.header-text{flex:1}.header-text h1{font-size:15px;font-weight:800;color:var(--green)}.header-text p{font-size:11px;color:var(--muted)}
.page{display:none}.page.active{display:block}
.container{max-width:560px;margin:0 auto;padding:16px}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border-radius:var(--radius);padding:32px 28px;width:100%;max-width:360px;box-shadow:var(--shadow);text-align:center}
.login-card img{width:72px;height:72px;border-radius:50%;object-fit:cover;border:2px solid var(--orange);margin-bottom:16px}
.login-card h2{font-size:20px;font-weight:800;color:var(--green);margin-bottom:4px}
.login-card p{font-size:13px;color:var(--muted);margin-bottom:24px}
.err{color:var(--red);font-size:13px;margin-top:8px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.save-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 22px;border-radius:24px;font-size:13px;font-weight:700;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
.save-toast.show{opacity:1}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal-overlay.hidden{display:none}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:560px;padding:24px 20px 32px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:18px;font-weight:800;margin-bottom:20px}
.modal-btns{display:flex;gap:10px;margin-top:18px}
.modal-btns .btn{flex:1}
.section-tab-wrap{display:flex;gap:10px;margin-bottom:16px}
.section-tab{flex:1;padding:10px;border-radius:10px;border:1.5px solid #dde8dd;background:#fff;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;color:var(--muted);transition:.2s}
.section-tab.active{background:var(--green);color:#fff;border-color:var(--green)}
.cat-title{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--green);padding:7px 12px;background:var(--green-light);border-radius:8px;margin:0 0 10px}
.dish-sel{display:flex;align-items:center;gap:10px;background:#fff;border-radius:12px;padding:10px 12px;margin-bottom:8px;box-shadow:var(--shadow);border:1.5px solid transparent;transition:border-color .2s}
.dish-sel.selected{border-color:var(--green);background:var(--green-light)}
.dish-sel-thumb{width:44px;height:44px;border-radius:8px;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden}
.dish-sel-thumb img{width:100%;height:100%;object-fit:cover}
.dish-sel-info{flex:1}
.dish-sel-name{font-size:14px;font-weight:700}
.dish-sel-price{font-size:12px;color:var(--green);font-weight:700;margin-top:2px}
.qty-ctrl{display:flex;align-items:center;gap:8px;flex-shrink:0}
.qty-btn{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--green);background:#fff;color:var(--green);font-size:16px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qty-num{font-size:15px;font-weight:800;min-width:18px;text-align:center}
.cart-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:14px 16px;border-top:2px solid var(--orange);display:flex;align-items:center;gap:12px;z-index:50}
.order-item-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0f4f0;font-size:14px}
.order-item-row:last-child{border-bottom:none}
.table-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:12px 0}
.table-btn{padding:14px 8px;border-radius:10px;border:1.5px solid #dde8dd;background:#fff;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer;transition:.2s;text-align:center}
.table-btn.selected{background:var(--green);color:#fff;border-color:var(--green)}
.table-btn.busy{background:var(--orange-light);border-color:var(--orange);color:#b87500}
.success-screen{text-align:center;padding:60px 20px}
.success-icon{font-size:64px;margin-bottom:16px}
/* Loading overlay */
#auth-loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;font-size:18px;font-weight:700;color:var(--green)}
</style>
</head>
<body>

<!-- Loading splash while Firebase Auth checks session -->
<div id="auth-loading">⏳ Завантаження...</div>

<!-- LOGIN SCREEN -->
<div class="login-wrap" id="login-screen" style="display:none">
  <div class="login-card">
    <img id="login-logo" alt="">
    <h2>Офіціант</h2>
    <p>Навчальне кафе коледжу</p>
    <div class="field">
      <label>Логін</label>
      <input class="input" id="login-input" placeholder="waiter1" autocomplete="username">
    </div>
    <div class="field">
      <label>Пароль</label>
      <input class="input" type="password" id="pwd-input" placeholder="Пароль" autocomplete="current-password">
    </div>
    <button class="btn btn-green btn-full" id="login-btn" onclick="doLogin()">Увійти</button>
    <p class="err" id="lerr"></p>
  </div>
</div>

<!-- APP SCREEN -->
<div id="app-screen" style="display:none">
  <div class="header">
    <img id="app-logo" alt="">
    <div class="header-text">
      <h1 id="waiter-name">Офіціант</h1>
      <p>Оформлення замовлення</p>
    </div>
    <button class="btn btn-sm btn-outline" onclick="doLogout()" style="margin-left:auto">Вийти</button>
  </div>
  <div class="container" style="padding-bottom:90px">
    <div class="page active" id="pg-menu">
      <div class="section-tab-wrap" style="margin-top:8px">
        <button class="section-tab active" onclick="switchSection('obidy',this)">🥗 Обіди</button>
        <button class="section-tab" onclick="switchSection('kafeteriy',this)">☕ Кафетерій</button>
      </div>
      <div id="menu-content"></div>
    </div>
    <div class="page" id="pg-confirm">
      <h2 style="font-size:20px;font-weight:800;margin:16px 0 12px">Підтвердження замовлення</h2>
      <div style="background:#fff;border-radius:var(--radius);padding:16px;margin-bottom:16px;box-shadow:var(--shadow)" id="order-summary"></div>
      <div style="font-size:14px;font-weight:800;margin-bottom:8px">Оберіть столик:</div>
      <div class="table-grid" id="table-grid"></div>
      <div id="confirm-err" class="err"></div>
      <div style="display:flex;gap:10px;margin-top:16px">
        <button class="btn btn-outline" style="flex:1" onclick="backToMenu()">← Назад</button>
        <button class="btn btn-green" style="flex:1" onclick="submitOrder()">Відправити на кухню</button>
      </div>
    </div>
    <div class="page" id="pg-success">
      <div class="success-screen">
        <div class="success-icon">✅</div>
        <h2 style="font-size:22px;font-weight:800;margin-bottom:8px">Замовлення відправлено!</h2>
        <p style="color:var(--muted);margin-bottom:24px">Кухня отримала замовлення</p>
        <button class="btn btn-green btn-full" onclick="newOrder()">Нове замовлення</button>
      </div>
    </div>
  </div>
  <div class="cart-bar" id="cart-bar" style="display:none">
    <div style="flex:1">
      <div style="font-weight:800;color:var(--green)" id="cart-count">0 позицій</div>
      <div style="font-size:12px;color:var(--muted)" id="cart-total">0 грн</div>
    </div>
    <button class="btn btn-green" onclick="goConfirm()">Оформити →</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB584GOt9Pf6GA5M2N-Txi0Yk2JmKTRJ-k",
  authDomain: "cafe-kpk.firebaseapp.com",
  databaseURL: "https://cafe-kpk-default-rtdb.firebaseio.com",
  projectId: "cafe-kpk",
  storageBucket: "cafe-kpk.firebasestorage.app",
  messagingSenderId: "1052158611750",
  appId: "1:1052158611750:web:97522c938d94932f51b1e7",
  measurementId: "G-592QG3E6JP"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const auth = getAuth(app);

// ── LOGO (base64 скорочено — вставте свій повний рядок) ──
const LOGO_SRC = "data:image/png;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAMCAgMCAgMDAwMEAwMEBQgFBQQEBQoH..."; // <-- вставте повний base64

// ── STATE ──
let currentUser  = null;
let cart         = {};
let currentSection = "obidy";
let menuData     = {};
let ordersData   = {};

// ── AUTH ──
window.doLogin = async function () {
  const login = document.getElementById("login-input").value.trim();
  const pwd   = document.getElementById("pwd-input").value;
  const errEl = document.getElementById("lerr");
  errEl.textContent = "";

  if (!login || !pwd) { errEl.textContent = "Введіть логін і пароль"; return; }

  const btn = document.getElementById("login-btn");
  btn.disabled = true;
  btn.textContent = "...";

  try {
    const email = login.includes("@") ? login : `${login}@cafe-kpk.com`;
    await signInWithEmailAndPassword(auth, email, pwd);
    // onAuthStateChanged підхопить далі
  } catch (e) {
    errEl.textContent = "Невірний логін або пароль";
    btn.disabled = false;
    btn.textContent = "Увійти";
  }
};

window.doLogout = async function () {
  currentUser = null;
  cart = {};
  await signOut(auth);
};

// ── AUTO SESSION via Firebase Auth ──
onAuthStateChanged(auth, async (firebaseUser) => {
  const loading      = document.getElementById("auth-loading");
  const loginScreen  = document.getElementById("login-screen");
  const appScreen    = document.getElementById("app-screen");

  if (firebaseUser) {
    const login = firebaseUser.email.split("@")[0];
    try {
      const snap = await get(ref(db, "cafe/users/" + login));
      const u = snap.val();
      if (u && u.role === "waiter") {
        loading.style.display     = "none";
        loginScreen.style.display = "none";
        startApp({ login, name: u.name });
      } else {
        await signOut(auth);
        loading.style.display     = "none";
        loginScreen.style.display = "flex";
      }
    } catch (e) {
      await signOut(auth);
      loading.style.display     = "none";
      loginScreen.style.display = "flex";
    }
  } else {
    loading.style.display     = "none";
    loginScreen.style.display = "flex";
    appScreen.style.display   = "none";
  }
});

// ── APP INIT ──
function startApp(user) {
  currentUser = user;
  document.getElementById("app-screen").style.display = "block";
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("waiter-name").textContent = user.name;
  document.getElementById("app-logo").src   = LOGO_SRC;
  document.getElementById("login-logo").src = LOGO_SRC;
  cart = {};
  renderMenu("obidy");

  onValue(ref(db, "cafe/menu"), snap => {
    menuData = snap.val() || {};
    if (currentUser) renderMenu(currentSection);
  });
  onValue(ref(db, "cafe/orders"), snap => {
    ordersData = snap.val() || {};
  });
}

// ── NAVIGATION ──
window.switchSection = function (sid, btn) {
  currentSection = sid;
  document.querySelectorAll(".section-tab").forEach(t => t.classList.remove("active"));
  btn.classList.add("active");
  renderMenu(sid);
};

// ── MENU RENDER ──
function renderMenu(sid) {
  const sec = menuData[sid];
  const el  = document.getElementById("menu-content");
  if (!sec) { el.innerHTML = `<div style="text-align:center;padding:40px;color:#bbb">Меню завантажується...</div>`; return; }

  const cats   = Object.values(sec.categories || {});
  const dishes = Object.values(sec.dishes     || {});
  let html = ""; let hasAny = false;

  cats.forEach(cat => {
    const catDishes = dishes.filter(d => d.category === cat.id && d.active);
    if (!catDishes.length) return;
    hasAny = true;
    html += `<div class="cat-title">${cat.icon} ${cat.name}</div>`;
    catDishes.forEach(d => {
      const qty  = cart[d.id] || 0;
      const sel  = qty > 0 ? " selected" : "";
      const thumb = d.photo
        ? `<div class="dish-sel-thumb"><img src="${d.photo}"></div>`
        : `<div class="dish-sel-thumb">${cat.icon}</div>`;
      html += `
        <div class="dish-sel${sel}" id="drow-${d.id}">
          ${thumb}
          <div class="dish-sel-info">
            <div class="dish-sel-name">${d.name}</div>
            <div class="dish-sel-price">${d.price} грн</div>
          </div>
          <div class="qty-ctrl">
            <button class="qty-btn" onclick="changeQty('${d.id}',-1,event)">−</button>
            <span class="qty-num" id="qty-${d.id}">${qty || ""}</span>
            <button class="qty-btn" onclick="changeQty('${d.id}',1,event)">+</button>
          </div>
        </div>`;
    });
  });
  if (!hasAny) html = `<div style="text-align:center;padding:40px;color:#bbb">Страви відсутні</div>`;
  el.innerHTML = html;
}

window.changeQty = function (dishId, delta, e) {
  e.stopPropagation();
  cart[dishId] = (cart[dishId] || 0) + delta;
  if (cart[dishId] <= 0) delete cart[dishId];
  const qEl = document.getElementById("qty-" + dishId);
  if (qEl) qEl.textContent = cart[dishId] || "";
  const row = document.getElementById("drow-" + dishId);
  if (row) row.classList.toggle("selected", (cart[dishId] || 0) > 0);
  updateCartBar();
};

function updateCartBar() {
  const items = getCartItems();
  const total = items.reduce((s, i) => s + parseFloat(i.price) * i.qty, 0);
  const count = items.reduce((s, i) => s + i.qty, 0);
  document.getElementById("cart-bar").style.display = count > 0 ? "flex" : "none";
  document.getElementById("cart-count").textContent = count + " позицій";
  document.getElementById("cart-total").textContent = total.toFixed(2) + " грн";
}

function getCartItems() {
  const items = [];
  ["obidy", "kafeteriy"].forEach(sid => {
    const sec = menuData[sid]; if (!sec) return;
    Object.values(sec.dishes || {}).forEach(d => {
      if (cart[d.id]) items.push({ ...d, qty: cart[d.id], section: sid });
    });
  });
  return items;
}

// ── CONFIRM / ORDER ──
window.goConfirm = function () {
  const items = getCartItems(); if (!items.length) return;
  showPage("pg-confirm");
  let html = ""; let total = 0;
  items.forEach(i => {
    const sub = parseFloat(i.price) * i.qty; total += sub;
    html += `<div class="order-item-row"><span>${i.name} × ${i.qty}</span><span style="font-weight:700">${sub.toFixed(2)} грн</span></div>`;
  });
  html += `<div style="padding-top:10px;font-weight:800;display:flex;justify-content:space-between"><span>Разом</span><span>${total.toFixed(2)} грн</span></div>`;
  document.getElementById("order-summary").innerHTML = html;
  renderTableGrid();
};

let selectedTable = null;
function renderTableGrid() {
  const busyTables = Object.values(ordersData || {}).filter(o => o.status === "open").map(o => o.table);
  let html = "";
  for (let i = 1; i <= 7; i++) {
    const busy = busyTables.includes(i);
    html += `<button class="table-btn${busy ? " busy" : ""}" onclick="selectTable(${i},this)">${busy ? "🔴 " : ""}Стіл ${i}</button>`;
  }
  document.getElementById("table-grid").innerHTML = html;
  selectedTable = null;
}

window.selectTable = function (n, btn) {
  document.querySelectorAll(".table-btn").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected"); selectedTable = n;
  document.getElementById("confirm-err").textContent = "";
};

window.submitOrder = async function () {
  if (!selectedTable) { document.getElementById("confirm-err").textContent = "Оберіть столик"; return; }
  const items   = getCartItems();
  const orderId = "ord_" + Date.now();
  await set(ref(db, "cafe/orders/" + orderId), {
    id: orderId, table: selectedTable,
    waiterName:  currentUser.name,
    waiterLogin: currentUser.login,
    items: items.map(i => ({ id: i.id, name: i.name, price: i.price, qty: i.qty })),
    status: "open", createdAt: new Date().toISOString()
  });
  cart = {};
  showPage("pg-success");
  document.getElementById("cart-bar").style.display = "none";
};

window.backToMenu = function () { showPage("pg-menu"); renderMenu(currentSection); };
window.newOrder   = function () { cart = {}; showPage("pg-menu"); renderMenu(currentSection); };

function showPage(id) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  window.scrollTo(0, 0);
}
</script>
</body>
</html>
